[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
# TCH removed: FastAPI requires real imports for dependency injection,
# not TYPE_CHECKING-only imports, so the TCH rule produces false positives.
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "SIM"]
ignore = ["E501", "B008"]   # B008: FastAPI Query/Depends calls in defaults are intentional

[tool.ruff.lint.per-file-ignores]
"scripts/*" = ["T201"]   # allow print() in scripts
"tests/*"   = ["S101"]   # allow assert in tests

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
exclude = ["scripts/", "tests/"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
filterwarnings = ["ignore::DeprecationWarning"]
markers = [
    "integration: marks tests as requiring a real PostgreSQL database (deselect with -m 'not integration')",
]

[tool.coverage.run]
source = ["app", "fetcher"]
omit = ["tests/*", "scripts/*"]
