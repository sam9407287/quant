[build]
builder = "DOCKERFILE"

# ── API Service ────────────────────────────────────────────────
[[services]]
name = "api"
dockerfile = "Dockerfile"

[services.deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ── Fetcher Worker ─────────────────────────────────────────────
[[services]]
name = "fetcher"
dockerfile = "Dockerfile.fetcher"

[services.deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
