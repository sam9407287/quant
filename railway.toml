[build]
builder = "DOCKERFILE"

# ── TimescaleDB ────────────────────────────────────────────────
# Self-hosted on Railway as a Docker service. A persistent volume must
# be attached to /var/lib/postgresql/data via the Railway dashboard;
# without one, all data is lost on redeploy. Schema and seed are baked
# into the image and run once on first boot (empty data dir only).
[[services]]
name = "timescaledb"
dockerfile = "db/Dockerfile"

[services.deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ── API Service ────────────────────────────────────────────────
[[services]]
name = "api"
dockerfile = "Dockerfile"

[services.deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ── Fetcher Worker ─────────────────────────────────────────────
[[services]]
name = "fetcher"
dockerfile = "Dockerfile.fetcher"

[services.deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ── Frontend (Next.js) ─────────────────────────────────────────
# Read-only browser for the data the API exposes. Talks to `api` over
# the public internet (not railway.internal) because requests originate
# in the user's browser; the server-side fetches in Next's app router
# also use the public URL so a single env var configures both paths.
[[services]]
name = "frontend"
dockerfile = "frontend/Dockerfile"

[services.deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
